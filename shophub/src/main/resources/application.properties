spring.application.name=example05
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

logging.level.org.springframework.security=DEBUG

project.image=images/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt_secret = 123

springdoc.swagger-ui.operation-sorter=alpha

springdoc.swagger-ui.doc-expansion=false

logging.level.org.springframework.security.web.access.ExceptionTranslationFilter=TRACE
logging.level.org.springframework.security.web.authentication=TRACE

spring.ai.openai.api-key=${AI_KEY}
spring.ai.openai.chat.model=${AI_MODEL}

# Load .env variables
spring.config.import=optional:file:.env[.properties],optional:file:shophub/.env[.properties]

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# spring.mail.username=${MAIL_USERNAME:ngthanhlong.cntt@gmail.com}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# VNPAY Configuration
vnpay.tmnCode=${TMN_CODE}
vnpay.hashSecret=${HASH_SECRET}
vnpay.url=${VNPAY_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name_here}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key_here}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret_here}
